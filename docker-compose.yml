services:
  api:
    build:
      context: .
      target: deps # Stop at deps stage for dev
    container_name: nest_api_dev
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
    depends_on:
      - redis
    command: npm run start:dev

  # Redis for Queues
  redis:
    image: redis:7-alpine
    container_name: nest_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: