name: CI/CD Pipeline to GCP

on:
  push:
    branches: [ "main" ] # Triggers when you push to the main branch

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        # npm ci is like npm install, but strictly follows package-lock.json
        run: npm ci 

      - name: Run Unit Tests
        # Ensure you have tests written! If this fails, the deploy stops here.
        run: npm run test

  build-and-deploy:
    name: Build Docker & Deploy to GCP
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      
      - name: Create secrets files
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          echo "${{ secrets.FIREBASE_SDK_CONTENT }}" > firebase-adminsdk.json

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Converts repository name to lowercase (required by Docker)
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to Google Cloud VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            set -e # Exit immediately if a command exits with a non-zero status.
            # Install docker-compose if not already installed
            if ! command -v docker-compose &> /dev/null
            then
                echo "docker-compose not found, installing..."
                # Download a specific version of Docker Compose (v2.26.1 is a recent stable version)
                sudo curl -L "https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
                sudo chmod +x /usr/local/bin/docker-compose
                echo "docker-compose installed."
            else
                echo "docker-compose already installed."
            fi

            # Create secrets files directly on the VPS
            echo "${{ secrets.ENV_FILE_CONTENT }}" > ~/nest-app/.env
            echo "${{ secrets.FIREBASE_SDK_CONTENT }}" > ~/nest-app/firebase-adminsdk.json

            # 1. Ensure deployment directory exists
            DEPLOY_DIR="$HOME/nest-app"
            if [ ! -d "$DEPLOY_DIR" ]; then
                echo "Directory $DEPLOY_DIR does not exist. Creating it..."
                mkdir -p "$DEPLOY_DIR"
                echo "Directory $DEPLOY_DIR created."
            else
                echo "Directory $DEPLOY_DIR already exists."
            fi
            cd ~/nest-app

            # 2. Login to GitHub Container Registry on the server
            echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 3. Pull the latest docker-compose.prod.yml directly from GitHub
            curl -H "Authorization: token ${{ secrets.GH_PAT }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 -O -L https://api.github.com/repos/${{ github.repository }}/contents/docker-compose.prod.yml

            # 4. Pull the new Docker image
            docker-compose -f docker-compose.prod.yml pull

            # 5. Restart the containers (creates new containers without downtime)
            docker-compose -f docker-compose.prod.yml up -d

            # 6. Cleanup old unused images to save disk space
            docker image prune -f