<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        .container { width: 80%; margin: 20px auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { background-color: #4A90E2; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .button { display: inline-block; padding: 10px 20px; background-color: #4A90E2; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
        .footer { font-size: 12px; color: #777; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to Our Platform!</h1>
        </div>
        <div class="content">
            <p>Hi {{ name }},</p>
            <p>Thanks for joining us! We're excited to have you on board. Your account has been successfully created with the email: <strong>{{ email }}</strong>.</p>
            <p>To get started, click the button below to explore your dashboard:</p>
            <a href="{{ dashboardUrl }}" class="button">Go to Dashboard</a>
        </div>
        <div class="footer">
            <p>&copy; 2026 My App Inc. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
